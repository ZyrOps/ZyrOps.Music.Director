<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1200" role="img" aria-label="Golden abstract album art for Arjun Nair">
  <defs>
    <radialGradient id="bg" cx="50%" cy="46%" r="62%">
      <stop offset="0%" stop-color="#FFD700"/>
      <stop offset="34%" stop-color="#FF2C55"/>
      <stop offset="70%" stop-color="#090909"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="line" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="52%" stop-color="#FFD700" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#FF2C55" stop-opacity="0.8"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="18" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="1200" fill="#000000"/>
  <rect x="60" y="60" width="1080" height="1080" fill="url(#bg)"/>
  <circle cx="600" cy="600" r="395" fill="none" stroke="#ffffff" stroke-opacity="0.16" stroke-width="2"/>
  <circle cx="600" cy="600" r="265" fill="none" stroke="#FFD700" stroke-opacity="0.35" stroke-width="3"/>
  <circle cx="600" cy="600" r="132" fill="#000000" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2"/>
  <g filter="url(#glow)" opacity="0.85">
    <path d="M120 720 C260 520 345 780 470 574 C590 378 710 860 840 558 C935 340 1030 610 1090 420" fill="none" stroke="url(#line)" stroke-width="18" stroke-linecap="round"/>
    <path d="M135 810 C280 655 382 885 532 672 C654 498 774 900 930 640 C1010 510 1050 562 1098 505" fill="none" stroke="#ffffff" stroke-opacity="0.34" stroke-width="5" stroke-linecap="round"/>
  </g>
  <text x="600" y="545" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="58" letter-spacing="22">ARJUN</text>
  <text x="600" y="635" text-anchor="middle" fill="#FFD700" font-family="Arial, sans-serif" font-size="136" font-weight="700" letter-spacing="8">NAIR</text>
  <text x="600" y="720" text-anchor="middle" fill="#ffffff" fill-opacity="0.75" font-family="Arial, sans-serif" font-size="28" letter-spacing="14">SCORE DIRECT DEFINE</text>
</svg>
